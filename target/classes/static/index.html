<!DOCTYPE html>
<html>

<head>

    <title>TechCorp Simulator</title>

    <style>

        body {

            background-color: #1e1e1e;
            color: white;
            font-family: Arial;
            margin: 20px;
        }

        button {

            padding: 10px;
            margin: 5px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;

            min-width: 180px;
            height: 70px;
            font-size: 15px;
        }

        button:hover {

            background-color: #2563eb;
        }

        .card {

            background-color: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .project-card {

            border-left: 6px solid #3b82f6;
        }

        .active-project {

            border-left: 6px solid #22c55e;
        }

        #topBar {

            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        #topControls {

            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-buttons {

            display: flex;
            flex-direction: row;
            gap: 12px;
            flex-wrap: wrap;
        }

        #mainLayout {

            display: none;
            gap: 30px;
            align-items: flex-start;
        }

        .panel {

            width: 33%;
        }

        progress {

            width: 100%;
            height: 20px;
        }

    </style>

</head>

<body>

    <div id="topBar">

        <div>

            <h1>TechCorp Simulator</h1>

            <h3 id="turnInfo"></h3>

        </div>

        <div id="topControls">

            <div id="difficultyMenu">

                <button onclick="setDifficulty('EASY')">
                    Easy AI
                </button>

                <button onclick="setDifficulty('NORMAL')">
                    Normal AI
                </button>

                <button onclick="setDifficulty('HARD')">
                    Hard AI
                </button>

            </div>

            <div
                class="action-buttons"
                id="actionButtons"
            >

                <button onclick="hireIntern()">

                    Hire Intern<br>

                    +2 Prod | $1000 + $1000/turn

                </button>

                <button onclick="hireFreelancer()">

                    Hire FreelancerBot<br>

                    +4 Prod | $18000 one-time

                </button>

                <button onclick="buyTool()">

                    Buy AutomatedTool<br>

                    +2 Prod | $5000 one-time

                </button>

                <button onclick="endTurn()">

                    End Turn

                </button>

            </div>

        </div>

    </div>

    <div id="mainLayout">

        <!-- PLAYER PANEL -->

        <div class="panel">

            <h2>Company Status</h2>

            <p id="cash"></p>

            <p id="employees"></p>

            <p id="productivity"></p>

            <p id="salaries"></p>

            <p id="freelancerBots"></p>

            <p id="automatedTools"></p>

            <p id="projectCount"></p>

            <h2>Active Projects</h2>

            <div id="activeProjects"></div>

            <h2>Finished Projects</h2>

            <div id="finishedProjects"></div>

        </div>

        <!-- PROJECTS PANEL -->

        <div class="panel">

            <div id="resultBox"></div>

            <h2 id="projectsTitle">
                Available Projects
            </h2>

            <div id="projects"></div>

        </div>

        <!-- AI PANEL -->

        <div class="panel">

            <h2>AI Status</h2>

            <p id="aiCash"></p>

            <p id="aiProductivity"></p>

            <p id="aiProjects"></p>

            <h2>AI Active Projects</h2>

            <div id="aiActiveProjects"></div>

            <h2>AI Finished Projects</h2>

            <div id="aiFinishedProjects"></div>

            <h2>Game Log</h2>

            <div
                id="gameLog"
                class="card"
            ></div>

        </div>

    </div>

    <script>

        async function loadGameState() {

            const response =
                await fetch("/game/state");

            const data =
                await response.json();

            updateUI(data);
        }

        async function hireIntern() {

            await fetch(
                "/game/hire/intern"
            );

            loadGameState();
        }

        async function hireFreelancer() {

            await fetch(
                "/game/hire/freelancer"
            );

            loadGameState();
        }

        async function buyTool() {

            await fetch(
                "/game/buy/tool"
            );

            loadGameState();
        }

        async function setDifficulty(
            difficulty
        ) {

            await fetch(
                "/game/difficulty/"
                + difficulty
            );

            loadGameState();
        }

        async function endTurn() {

            await fetch(
                "/game/endTurn"
            );

            loadGameState();
        }

        async function acceptProject(
            projectName
        ) {

            await fetch(
                "/game/accept/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function holdProject(
            projectName
        ) {

            await fetch(
                "/game/hold/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function resumeProject(
            projectName
        ) {

            await fetch(
                "/game/resume/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function cancelProject(
            projectName
        ) {

            await fetch(
                "/game/cancel/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        function updateUI(data) {

            if (data.gameStarted) {

                document.getElementById(
                    "mainLayout"
                ).style.display = "flex";

                document.getElementById(
                    "difficultyMenu"
                ).style.display = "none";

                document.getElementById(
                    "actionButtons"
                ).style.display = "flex";

                document.getElementById(
                    "turnInfo"
                ).textContent =
                    "Turn: "
                    + data.turn;
            }

            else {

                document.getElementById(
                    "mainLayout"
                ).style.display = "none";

                document.getElementById(
                    "difficultyMenu"
                ).style.display = "flex";

                document.getElementById(
                    "actionButtons"
                ).style.display = "none";

                document.getElementById(
                    "turnInfo"
                ).textContent = "";
            }

            document.getElementById(
                "cash"
            ).textContent =
                "Cash: "
                + data.cash;

            document.getElementById(
                "employees"
            ).textContent =
                "Employees: "
                + data.employees;

            document.getElementById(
                "productivity"
            ).textContent =
                "Productivity: "
                + data.productivity;

            document.getElementById(
                "salaries"
            ).textContent =
                "Salaries/Turn: "
                + data.totalSalaries;

            document.getElementById(
                "freelancerBots"
            ).textContent =
                "FreelancerBots: "
                + data.freelancerBots;

            document.getElementById(
                "automatedTools"
            ).textContent =
                "AutomatedTools: "
                + data.automatedTools;

            document.getElementById(
                "projectCount"
            ).textContent =
                "Active Projects: "
                + data.activeProjectCount;

            document.getElementById(
                "aiCash"
            ).textContent =
                "AI Cash: "
                + data.aiCash;

            document.getElementById(
                "aiProductivity"
            ).textContent =
                "AI Productivity: "
                + data.aiProductivity;

            document.getElementById(
                "aiProjects"
            ).textContent =
                "AI Active Projects: "
                + data.aiProjects;

            document.getElementById(
                "gameLog"
            ).innerHTML =
                data.turnLog;

            /* PLAYER PROJECTS */

            const activeProjectsDiv =
                document.getElementById(
                    "activeProjects"
                );

            const finishedProjectsDiv =
                document.getElementById(
                    "finishedProjects"
                );

            activeProjectsDiv.innerHTML = "";
            finishedProjectsDiv.innerHTML = "";

            for (const project
                of data.activeProjects) {

                const projectHtml = `
                    <div class="
                        card
                        ${
                            project.status === "FINISHED"
                            ?
                            "project-card"
                            :
                            "active-project"
                        }
                    ">

                        <h3>
                            ${project.name}
                        </h3>

                        <p>
                            Progress:
                            ${project.progress}
                            /
                            ${project.requiredWork}
                        </p>

                        <progress
                            value="${project.progress}"
                            max="${project.requiredWork}">
                        </progress>

                        ${
                            project.status !== "FINISHED"
                            ?
                            `
                            <p>
                                Status:
                                ${project.status}
                            </p>

                            <p>
                                Reward:
                                ${project.reward}
                            </p>
                            `
                            :
                            ""
                        }

                        ${
                            project.status === "IN_PROGRESS"
                            ?
                            `
                            <button
                                onclick="
                                    holdProject(
                                        '${project.name}'
                                    )
                                ">
                                Hold
                            </button>
                            `
                            :
                            ""
                        }

                        ${
                            project.status === "ON_HOLD"
                            ?
                            `
                            <button
                                onclick="
                                    resumeProject(
                                        '${project.name}'
                                    )
                                ">
                                Resume
                            </button>
                            `
                            :
                            ""
                        }

                        ${
                            project.status === "PLANNED"
                            ?
                            `
                            <button
                                onclick="
                                    cancelProject(
                                        '${project.name}'
                                    )
                                ">
                                Cancel
                            </button>
                            `
                            :
                            ""
                        }

                    </div>
                `;

                if (
                    project.status === "FINISHED"
                ) {

                    finishedProjectsDiv.innerHTML
                        += projectHtml;
                }

                else {

                    activeProjectsDiv.innerHTML
                        += projectHtml;
                }
            }

            /* AVAILABLE PROJECTS */

            const projectsDiv =
                document.getElementById(
                    "projects"
                );

            const resultBox =
                document.getElementById(
                    "resultBox"
                );

            const projectsTitle =
                document.getElementById(
                    "projectsTitle"
                );

            projectsDiv.innerHTML = "";
            resultBox.innerHTML = "";

            if (data.gameOver) {

                projectsTitle.textContent =
                    "Game Result";

                resultBox.innerHTML = `
                    <div class="
                        card
                        project-card
                    ">

                        <h1>
                            ${data.winner}
                        </h1>

                        <p>
                            Final Cash:
                            ${data.cash}
                        </p>

                        <p>
                            AI Cash:
                            ${data.aiCash}
                        </p>

                        <p>
                            Total Turns:
                            ${data.turn}
                        </p>

                    </div>
                `;

                return;
            }

            projectsTitle.textContent =
                "Available Projects";

            for (const project
                of data.availableProjects) {

                projectsDiv.innerHTML += `
                    <div class="
                        card
                        project-card
                    ">

                        <h3>
                            ${project.name}
                        </h3>

                        <p>
                            Work:
                            ${project.requiredWork}
                        </p>

                        <p>
                            Reward:
                            ${project.reward}
                        </p>

                        <button
                            onclick="
                                acceptProject(
                                    '${project.name}'
                                )
                            ">
                            Accept Project
                        </button>

                    </div>
                `;
            }

            /* AI PROJECTS */

            const aiProjectsDiv =
                document.getElementById(
                    "aiActiveProjects"
                );

            const aiFinishedProjectsDiv =
                document.getElementById(
                    "aiFinishedProjects"
                );

            aiProjectsDiv.innerHTML = "";
            aiFinishedProjectsDiv.innerHTML = "";

            for (const project
                of data.aiActiveProjects) {

                const aiProjectHtml = `
                    <div class="
                        card
                        ${
                            project.status === "FINISHED"
                            ?
                            "project-card"
                            :
                            "active-project"
                        }
                    ">

                        <h3>
                            ${project.name}
                        </h3>

                        <p>
                            Progress:
                            ${project.progress}
                            /
                            ${project.requiredWork}
                        </p>

                        <progress
                            value="${project.progress}"
                            max="${project.requiredWork}">
                        </progress>

                    </div>
                `;

                if (
                    project.status === "FINISHED"
                ) {

                    aiFinishedProjectsDiv.innerHTML
                        += aiProjectHtml;
                }

                else {

                    aiProjectsDiv.innerHTML
                        += aiProjectHtml;
                }
            }
        }

        loadGameState();

    </script>

</body>

</html>
