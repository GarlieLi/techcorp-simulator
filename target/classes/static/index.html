<!DOCTYPE html>
<html>

<head>

    <title>TechCorp Simulator</title>

    <style>

        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial;
            margin: 20px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        button {
            padding: 14px 18px;
            background-color: #5b7ce3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 220px;
            font-size: 15px;
        }

        button:hover {
            background-color: #4c6fd6;
        }

        .top-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .project-card {
            border-left: 6px solid #5b7ce3;
        }

        .active-project {
            border-left: 6px solid #6ee56e;
        }

        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
        }

        #mainLayout {
            display: flex;
            gap: 35px;
            align-items: flex-start;
        }

        .panel {
            width: 33%;
        }

        progress {
            width: 100%;
            height: 20px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

    </style>

</head>

<body>

    <div id="topBar">

        <div>

            <h1>TechCorp Simulator</h1>

            <h2 id="turnInfo"></h2>

        </div>

        <div>

            <div id="difficultyMenu" class="top-buttons">

                <button onclick="setDifficulty('EASY')">
                    Easy AI
                </button>

                <button onclick="setDifficulty('NORMAL')">
                    Normal AI
                </button>

                <button onclick="setDifficulty('HARD')">
                    Hard AI
                </button>

            </div>

            <div
                id="actionButtons"
                class="top-buttons"
                style="display:none;"
            >

                <button onclick="hireIntern()">
                    Hire Intern<br>
                    +1 Prod | $1000 + $1000/turn
                </button>

                <button onclick="hireFreelancer()">
                    Hire FreelancerBot<br>
                    +4 Prod | $18000 one-time
                </button>

                <button onclick="buyTool()">
                    Buy AutomatedTool<br>
                    +2 Prod | $5000 one-time
                </button>

                <button onclick="endTurn()">
                    End Turn
                </button>

            </div>

        </div>

    </div>

    <div
        id="mainLayout"
        style="display:none;"
    >

        <!-- PLAYER PANEL -->

        <div class="panel">

            <h2>Company Status</h2>

            <p id="cash"></p>
            <p id="employees"></p>
            <p id="productivity"></p>
            <p id="salaries"></p>
            <p id="freelancerBots"></p>
            <p id="automatedTools"></p>
            <p id="projectCount"></p>

            <h2>Active Projects</h2>

            <div id="activeProjects"></div>

            <h2>Finished Projects</h2>

            <div id="finishedProjects"></div>

        </div>

        <!-- CENTER PANEL -->

        <div class="panel">

            <div id="resultBox"></div>

            <h2 id="projectsTitle">
                Available Projects
            </h2>

            <div id="projects"></div>

        </div>

        <!-- AI PANEL -->

        <div class="panel">

            <h2>AI Status</h2>

            <p id="aiCash"></p>
            <p id="aiProductivity"></p>
            <p id="aiProjects"></p>

            <h2>AI Active Projects</h2>

            <div id="aiActiveProjects"></div>

            <h2>AI Finished Projects</h2>

            <div id="aiFinishedProjects"></div>

            <h2>Game Log</h2>

            <div
                id="gameLog"
                class="card"
            ></div>

        </div>

    </div>

    <script>

        async function loadGameState() {

            const response =
                await fetch("/game/state");

            const data =
                await response.json();

            updateUI(data);
        }

        async function hireIntern() {

            await fetch("/game/hire/intern");

            loadGameState();
        }

        async function hireFreelancer() {

            await fetch("/game/hire/freelancer");

            loadGameState();
        }

        async function buyTool() {

            await fetch("/game/buy/tool");

            loadGameState();
        }

        async function endTurn() {

            await fetch("/game/endTurn");

            loadGameState();
        }

        async function setDifficulty(
            difficulty
        ) {

            await fetch(
                "/game/difficulty/"
                + difficulty
            );

            loadGameState();
        }

        async function acceptProject(
            projectName
        ) {

            await fetch(
                "/game/accept/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function holdProject(
            projectName
        ) {

            await fetch(
                "/game/hold/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function resumeProject(
            projectName
        ) {

            await fetch(
                "/game/resume/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function cancelProject(
            projectName
        ) {

            await fetch(
                "/game/cancel/"
                + encodeURIComponent(
                    projectName
                )
            );

            loadGameState();
        }

        async function restartGame() {
            
            await fetch(
                "/game/restart"
            );
            
            location.reload();
        }

        function updateUI(data) {

            const difficultyMenu =
                document.getElementById(
                    "difficultyMenu"
                );

            const actionButtons =
                document.getElementById(
                    "actionButtons"
                );

            const mainLayout =
                document.getElementById(
                    "mainLayout"
                );

            const projectsTitle =
                document.getElementById(
                    "projectsTitle"
                );

            const resultBox =
                document.getElementById(
                    "resultBox"
                );

            const projectsDiv =
                document.getElementById(
                    "projects"
                );

            if (data.gameStarted) {
                
                difficultyMenu.style.display = "flex";
                
                actionButtons.style.display = "flex";
                
                mainLayout.style.display = "flex";
                
                difficultyMenu.style.display = "none";
                
                document.getElementById(
                    "turnInfo"
                ).textContent =
                    "Turn: " + data.turn;
            }
            else {
                
                difficultyMenu.style.display = "flex";
                
                actionButtons.style.display = "none";
                
                mainLayout.style.display = "none";
                
                document.getElementById(
                    "turnInfo"
                ).textContent = "";
            }

            document.getElementById(
                "cash"
            ).textContent =
                "Cash: " + data.cash;

            document.getElementById(
                "employees"
            ).textContent =
                "Employees: "
                + data.employees;

            document.getElementById(
                "productivity"
            ).textContent =
                "Productivity: "
                + data.productivity;

            document.getElementById(
                "salaries"
            ).textContent =
                "Salaries/Turn: "
                + data.totalSalaries;

            document.getElementById(
                "freelancerBots"
            ).textContent =
                "FreelancerBots: "
                + data.freelancerBots;

            document.getElementById(
                "automatedTools"
            ).textContent =
                "AutomatedTools: "
                + data.automatedTools;

            document.getElementById(
                "projectCount"
            ).textContent =
                "Active Projects: "
                + data.activeProjectCount;

            document.getElementById(
                "aiCash"
            ).textContent =
                "AI Cash: "
                + data.aiCash;

            document.getElementById(
                "aiProductivity"
            ).textContent =
                "AI Productivity: "
                + data.aiProductivity;

            document.getElementById(
                "aiProjects"
            ).textContent =
                "AI Active Projects: "
                + data.aiProjects;

            document.getElementById(
                "gameLog"
            ).innerHTML =
                data.turnLog;

            const activeProjectsDiv =
                document.getElementById(
                    "activeProjects"
                );

            const finishedProjectsDiv =
                document.getElementById(
                    "finishedProjects"
                );

            activeProjectsDiv.innerHTML = "";
            finishedProjectsDiv.innerHTML = "";

            for (const project of data.activeProjects) {

                const projectHtml = `

                    <div class="
                        card
                        ${
                            project.status === "FINISHED"
                            ?
                            "project-card"
                            :
                            "active-project"
                        }
                    ">

                        <h3>
                            ${project.name}
                        </h3>

                        <p>
                            Progress:
                            ${project.progress}
                            /
                            ${project.requiredWork}
                        </p>

                        <progress
                            value="${project.progress}"
                            max="${project.requiredWork}">
                        </progress>

                        ${
                            project.status !== "FINISHED"
                            ?
                            `
                            <p>
                                Status:
                                ${project.status}
                            </p>

                            <p>
                                Reward:
                                ${project.reward}
                            </p>
                            `
                            :
                            ""
                        }

                        ${
                            project.status === "IN_PROGRESS"
                            ?
                            `
                            <button onclick="
                                holdProject(
                                    '${project.name}'
                                )
                            ">
                                Hold
                            </button>
                            `
                            :
                            ""
                        }

                        ${
                            project.status === "ON_HOLD"
                            ?
                            `
                            <button onclick="
                                resumeProject(
                                    '${project.name}'
                                )
                            ">
                                Resume
                            </button>
                            `
                            :
                            ""
                        }

                        ${
                            project.status === "PLANNED"
                            ?
                            `
                            <button onclick="
                                cancelProject(
                                    '${project.name}'
                                )
                            ">
                                Cancel
                            </button>
                            `
                            :
                            ""
                        }

                    </div>
                `;

                if (
                    project.status === "FINISHED"
                ) {

                    finishedProjectsDiv.innerHTML
                        += projectHtml;
                }

                else {

                    activeProjectsDiv.innerHTML
                        += projectHtml;
                }
            }

            if (data.gameOver) {

                actionButtons.style.display =
                    "none";

                projectsTitle.style.display =
                    "none";

                resultBox.innerHTML = `
                
                    <div class="
                        card
                        project-card
                    "
                    
                    style="
                        text-align:center;
                        padding:30px;
                        max-width:700px;
                        margin:auto;
                    ">
                    
                        <h1 style="
                            font-size:52px;
                            margin-bottom:10px;
                        ">
                            
                            ${
                                data.winner === "PLAYER WINS"
                                ?
                                "🏆 PLAYER WINS"
                                :
                                data.winner === "AI WINS"
                                ?
                                "🤖 AI WINS"
                                :
                                "🤝 DRAW"
                            }
                        
                        </h1>
                        
                        <p style="
                            font-size:18px;
                            color:#9ca3af;
                            margin-bottom:30px;
                        ">
                            TechCorp Simulation Complete
                        </p>
                        
                        <div style="
                            display:flex;
                            flex-direction:column;
                            gap:18px;
                            margin-top:20px;
                        ">
                        
                            <div class="card"
                                style="
                                    background:#1e293b;
                                    padding:20px;
                                ">
                                
                                <h3>
                                    💰 Final Cash
                                </h3>
                                
                                <p>
                                    Player:
                                    <span style="
                                        color:#22c55e;
                                        font-weight:bold;
                                    ">
                                        $${data.cash}
                                    </span>
                                </p>
                                
                                <p>
                                    AI:
                                    <span style="
                                        color:#60a5fa;
                                        font-weight:bold;
                                    ">
                                        $${data.aiCash}
                                    </span>
                                </p>
                            </div>
                            
                            <div class="card"
                                style="
                                    background:#1e293b;
                                    padding:20px;
                                ">
                                
                                <h3>
                                    ⚡ Productivity
                                </h3>
                                
                                <p>
                                    Player:
                                    <span style="
                                        color:#22c55e;
                                        font-weight:bold;
                                    ">
                                        ${data.productivity}
                                    </span>
                                </p>
                                <p>
                                    AI:
                                    <span style="
                                        color:#60a5fa;
                                        font-weight:bold;
                                    ">
                                        ${data.aiProductivity}
                                    </span>
                                </p>
                            </div>
                            
                            <div class="card"
                                style="
                                    background:#1e293b;
                                    padding:20px;
                                ">
                                
                                <h3>
                                    📈 Total Turns
                                </h3>
                                
                                <p style="
                                    font-size:28px;
                                    color:#facc15;
                                    font-weight:bold;
                                ">
                                    ${data.turn}
                                </p>

                                <button onclick="restartGame()">
                                    Restart Game
                                </button>

                            </div>
                        </div>
                    </div>
                `;

                projectsDiv.innerHTML = "";

                return;
            }

            projectsTitle.style.display =
                "block";

            projectsTitle.textContent =
                "Available Projects";

            resultBox.innerHTML = "";

            projectsDiv.innerHTML = "";

            for (const project
                of data.availableProjects) {

                projectsDiv.innerHTML += `

                    <div class="
                        card
                        project-card
                    ">

                        <h3>
                            ${project.name}
                        </h3>

                        <p>
                            Work:
                            ${project.requiredWork}
                        </p>

                        <p>
                            Reward:
                            ${project.reward}
                        </p>

                        <button onclick="
                            acceptProject(
                                '${project.name}'
                            )
                        ">

                            Accept Project

                        </button>

                    </div>
                `;
            }

            const aiProjectsDiv =
                document.getElementById(
                    "aiActiveProjects"
                );

            const aiFinishedProjectsDiv =
                document.getElementById(
                    "aiFinishedProjects"
                );

            aiProjectsDiv.innerHTML = "";
            aiFinishedProjectsDiv.innerHTML = "";

            for (const project
                of data.aiActiveProjects) {

                const aiProjectHtml = `

                    <div class="
                        card
                        ${
                            project.status === "FINISHED"
                            ?
                            "project-card"
                            :
                            "active-project"
                        }
                    ">

                        <h3>
                            ${project.name}
                        </h3>

                        <p>
                            Progress:
                            ${project.progress}
                            /
                            ${project.requiredWork}
                        </p>

                        <progress
                            value="${project.progress}"
                            max="${project.requiredWork}">
                        </progress>

                    </div>
                `;

                if (
                    project.status === "FINISHED"
                ) {

                    aiFinishedProjectsDiv.innerHTML
                        += aiProjectHtml;
                }

                else {

                    aiProjectsDiv.innerHTML
                        += aiProjectHtml;
                }
            }
        }

        loadGameState();

    </script>

</body>

</html>
